---
- name: Install UFW firewall
  apt:
    name: ufw
    state: present

- name: Allow SSH
  ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Allow HTTP
  ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: Allow frontend port
  ufw:
    rule: allow
    port: '3000'
    proto: tcp

- name: Allow backend port
  ufw:
    rule: allow
    port: '5000'
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny
    direction: incoming
